<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="application-name" content="T3 Code" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="T3 Code" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f8fafc" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#050816" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <style>
      :root {
        color-scheme: light;
        --boot-bg: #f8fafc;
        --boot-fg: #111827;
        --boot-muted: #667085;
        --boot-card: rgba(255, 255, 255, 0.9);
        --boot-border: rgba(15, 23, 42, 0.08);
        --boot-accent: #465fff;
        --boot-accent-soft: rgba(70, 95, 255, 0.14);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --boot-bg: #050816;
          --boot-fg: #f8fafc;
          --boot-muted: #94a3b8;
          --boot-card: rgba(15, 23, 42, 0.72);
          --boot-border: rgba(255, 255, 255, 0.08);
          --boot-accent: #7c8cff;
          --boot-accent-soft: rgba(124, 140, 255, 0.18);
        }
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top, var(--boot-accent-soft), transparent 38%),
          linear-gradient(180deg, color-mix(in srgb, var(--boot-bg) 92%, white 8%), var(--boot-bg));
      }

      #root {
        min-height: 100vh;
      }

      .boot-splash {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        color: var(--boot-fg);
        font-family:
          "DM Sans",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          system-ui,
          sans-serif;
      }

      .boot-card {
        width: min(100%, 420px);
        border-radius: 28px;
        border: 1px solid var(--boot-border);
        background: var(--boot-card);
        box-shadow:
          0 32px 80px rgba(15, 23, 42, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.28);
        backdrop-filter: blur(18px);
        padding: 28px 24px;
      }

      .boot-mark {
        width: 72px;
        height: 72px;
        border-radius: 22px;
        display: grid;
        place-items: center;
        margin-bottom: 18px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.12)),
          var(--boot-accent-soft);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.5),
          0 16px 32px rgba(70, 95, 255, 0.18);
        animation: boot-breathe 1.8s ease-in-out infinite;
      }

      .boot-mark img {
        width: 42px;
        height: 42px;
        object-fit: contain;
      }

      .boot-eyebrow {
        margin: 0 0 8px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--boot-muted);
      }

      .boot-title {
        margin: 0;
        font-size: clamp(2rem, 4vw, 2.6rem);
        line-height: 1;
        letter-spacing: -0.04em;
      }

      .boot-copy {
        margin: 12px 0 0;
        font-size: 15px;
        line-height: 1.6;
        color: var(--boot-muted);
      }

      .boot-progress {
        position: relative;
        overflow: hidden;
        margin-top: 22px;
        height: 10px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.18);
      }

      .boot-progress::before {
        content: "";
        position: absolute;
        inset: 0;
        width: 42%;
        border-radius: inherit;
        background: linear-gradient(
          90deg,
          var(--boot-accent),
          color-mix(in srgb, var(--boot-accent) 68%, white 32%)
        );
        box-shadow: 0 0 24px rgba(70, 95, 255, 0.45);
        animation: boot-slide 1.4s ease-in-out infinite;
      }

      .boot-status {
        margin-top: 14px;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        color: var(--boot-muted);
      }

      .boot-dots {
        display: inline-flex;
        gap: 4px;
      }

      .boot-dots span {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: color-mix(in srgb, var(--boot-accent) 70%, white 30%);
        animation: boot-dot 1s ease-in-out infinite;
      }

      .boot-dots span:nth-child(2) {
        animation-delay: 0.14s;
      }

      .boot-dots span:nth-child(3) {
        animation-delay: 0.28s;
      }

      @keyframes boot-breathe {
        0%,
        100% {
          transform: scale(0.96);
        }

        50% {
          transform: scale(1.03);
        }
      }

      @keyframes boot-slide {
        0% {
          transform: translateX(-120%);
        }

        55% {
          transform: translateX(155%);
        }

        100% {
          transform: translateX(155%);
        }
      }

      @keyframes boot-dot {
        0%,
        80%,
        100% {
          transform: scale(0.72);
          opacity: 0.45;
        }

        40% {
          transform: scale(1);
          opacity: 1;
        }
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..800;1,9..40,300..800&display=swap"
      rel="stylesheet"
    />
    <title>T3 Code (Alpha)</title>
    <script>
      (() => {
        const BOOT_READY_ATTRIBUTE = "data-t3-boot-ready";
        const BOOT_RELOAD_MARKER_KEY = "t3code:boot-reload-marker";
        const BOOT_TIMEOUT_MS = 12000;
        const BOOT_RELOAD_COOLDOWN_MS = 60000;

        window.__T3_MARK_BOOT_READY = () => {
          document.documentElement.setAttribute(BOOT_READY_ATTRIBUTE, "true");
          try {
            sessionStorage.removeItem(BOOT_RELOAD_MARKER_KEY);
          } catch {
            // Ignore storage failures and leave the page running.
          }
        };

        window.setTimeout(() => {
          if (document.documentElement.getAttribute(BOOT_READY_ATTRIBUTE) === "true") {
            return;
          }

          const splash = document.querySelector(".boot-splash");
          if (!splash) {
            return;
          }

          const nowMs = Date.now();
          let lastReloadAtMs = 0;
          try {
            lastReloadAtMs = Number.parseInt(
              sessionStorage.getItem(BOOT_RELOAD_MARKER_KEY) ?? "0",
              10,
            );
          } catch {
            // Ignore storage failures and fall through to a single reload attempt.
          }

          if (Number.isFinite(lastReloadAtMs) && nowMs - lastReloadAtMs < BOOT_RELOAD_COOLDOWN_MS) {
            return;
          }

          try {
            sessionStorage.setItem(BOOT_RELOAD_MARKER_KEY, String(nowMs));
          } catch {
            // Ignore storage failures and still attempt the reload.
          }

          window.location.reload();
        }, BOOT_TIMEOUT_MS);
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div class="boot-splash" aria-live="polite" aria-busy="true">
        <section class="boot-card" aria-label="T3 Code is loading">
          <div class="boot-mark">
            <img src="/apple-touch-icon.png" alt="" />
          </div>
          <p class="boot-eyebrow">T3 Code</p>
          <h1 class="boot-title">Starting up</h1>
          <p class="boot-copy">Loading your workspace and reconnecting to the server.</p>
          <div class="boot-progress" aria-hidden="true"></div>
          <div class="boot-status">
            <span>Preparing your session</span>
            <span class="boot-dots" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </span>
          </div>
        </section>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
